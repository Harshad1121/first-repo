<!DOCTYPE html>
<html>
<head>
    <title>Harshad's Programs Menu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            padding: 50px;
            max-width: 600px;
            text-align: center;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 2.5em;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }
        
        .menu-links {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .menu-links a {
            display: block;
            padding: 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1em;
            transition: transform 0.3s, box-shadow 0.3s;
            text-align: center;
        }
        
        .menu-links a:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .footer-links {
            margin-top: 30px;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }
        
        .footer-links a {
            display: inline-block;
            margin: 0 10px;
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }
        
        .footer-links a:hover {
            color: #764ba2;
        }
        
        .add-new {
            background: #28a745;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 My Programs</h1>
        <p class="subtitle">Click to open any program</p>
        
        <div class="menu-links">
            <a href="1st.html">🏍️ Program 1</a>
            <a href="2st.html">👤 Program 2</a>
            <a href="3rd.html">🔗 Program 3</a>
            <a href="4th.html">📌 Program 4</a>
        </div>
        
        <div class="footer-links">
            <a href="https://github.com/Harshad1121/first-repo" target="_blank">🐙 GitHub Repo</a>
        </div>
        
        <div class="add-new">
            <strong>💡 To add new program:</strong><br>
            Create new file (e.g., 5th.html) and add link here: 
            &lt;a href="5th.html"&gt;Program 5&lt;/a&gt;
        </div>
    </div>
</body>
</html>
