<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
</head>
<body>
    <center>
        <h1>Student Registration</h1>
    </center>
    <form>
        <center><table>
            <tr>
                <td><label for="name">Name:</label></td>
                <td><input type="text" id="name" name="name" required></td>
            </tr>
            <tr>
                <td><label for="email">Email:</label></td>
                <td><input type="email" id="email" name="email" required></td>
            </tr>
            <tr>
                <td><label for="password">Password:</label></td>
                <td><input type="password" id="password" name="password" required></td>
            </tr>
            <tr>
                <td><label for="phone">Phone:</label></td>
                <td><input type="tel" id="phone" name="phone" required></td>
            </tr>
            <tr>
                <td><label for="gender">Gender:</label></td>
                <td>
                    <input type="radio" id="male" name="gender" value="male" required>
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female" required>
                    <label for="female">Female</label>
                </td>
            </tr>
            <tr>
                <td><label for="hobbies">Hobbies:</label></td>
                <td>
                    <input type="checkbox" id="reading" name="hobbies" value="reading">
                    <label for="reading">Reading</label>
                    <input type="checkbox" id="sports" name="hobbies" value="sports">
                    <label for="sports">Sports</label>
                    <input type="checkbox" id="music" name="hobbies" value="music">
                    <label for="music">Music</label>
                </td>
            </tr>
            <tr>
                <td><label for="course">Course:</label></td>
                <td>
                    <select id="course" name="course" required>
                        <option value="">Select a course</option>
                        <option value="computer_science">Computer Science</option>
                        <option value="CSBS">CSBS</option>
                        <option value="Mechanical">Mechanical</option>
                        <option value="Civil">Civil</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><label for="birthdate">Birth Date:</label></td>
                <td><input type="date" id="birthdate" name="birthdate" required></td>
            </tr>
            <tr>
                <td><label for="upload_photo">Upload Photo:</label></td>
                <td><input type="file" id="upload_photo" name="upload_photo" accept="image/*" required></td>
            </tr>
            <tr>
                <td colspan="2"><input type="submit" value="Register"></td> 
        </table></center>
    </form>
</body>
</html>
