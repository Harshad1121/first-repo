<!DOCTYPE html>
<html>
<head>
    <title>Student's Marks Table </title>
</head>
<body>
    <center>
        <table border="1" cellspacing="0" cellpadding="5">
            <tr>
                <th colspan="6"><center><h1>Student's Marks Report</h1></center></th>
            </tr>
            <tr>
                <th>Student Name</th>
                <th>Maths</th>
                <th>Science</th>
                <th>English</th>
                <th>Total Marks</th>
                <th>Percentage</th>
            </tr>
            <tr>
                <td>Alice</td>
                <td>85</td>
                <td>90</td>
                <td>88</td>
                <td>263</td>
                <td>87.67%</td>
            </tr>
            <tr>
                <td>Bob</td>
                <td>78</td>
                <td>82</td>
                <td>80</td>
                <td>240</td>
                <td>80.00%</td>
            </tr>
            <tr>
                <td>Charlie</td>
                <td>92</td>
                <td>95</td>
                <td>94</td>
                <td>281</td>
                <td>93.67%</td>
            </tr>
        </table>
    </center>
</body>
</html>
